<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptVault USA | Strategic AI Advantage</title>

<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root { 
    --primary:#0070ba; 
    --secondary:#00d4ff; 
    --dark:#020617; 
    --card:#0f172a;
    --accent:#f59e0b; 
    --success:#10b981; 
    --border:rgba(255,255,255,0.1); 
}

*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;
    background:var(--dark);
    color:white;
}

.container{max-width:1200px;margin:auto;padding:20px}

/* NAV */
nav{
    position:sticky;top:0;
    display:flex;justify-content:space-between;
    padding:15px 30px;
    background:rgba(2,6,23,.9);
    backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
}

.logo-area{display:flex;gap:10px;align-items:center;font-weight:800;cursor:pointer}
.logo-img{width:36px;border-radius:8px}

.btn{
    padding:10px 16px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:700;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-google{background:#fff;color:#000}

/* HERO */
.hero{text-align:center;padding:60px 20px}
.highlight{
    background:linear-gradient(to right,#38bdf8,#818cf8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* TABS */
.tab-menu{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.tab-link{
    padding:10px 18px;
    border-radius:50px;
    background:rgba(255,255,255,.05);
    cursor:pointer;
    font-size:.8rem;
}
.tab-link.active{background:var(--primary);color:#fff}

.tab-content{display:none;margin-top:30px}
.tab-content.active{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.glass{
    background:var(--card);
    padding:25px;
    border-radius:20px;
    border:1px solid var(--border);
}

/* MODAL */
.modal{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,.9);
    justify-content:center;align-items:center;
}
.modal.show{display:flex}

.modal-card{
    background:var(--card);
    padding:30px;
    border-radius:20px;
    width:90%;max-width:400px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--dark);
    color:#fff;
}

/* CHAT */
.chat-box{height:250px;overflow:auto;margin-bottom:10px}
.msg{padding:10px;border-radius:12px;margin:5px 0}
.user{background:#1e293b;text-align:right}
.bot{background:var(--primary)}

.buy-btn{
    display:block;
    padding:15px;
    border-radius:12px;
    text-align:center;
    font-weight:800;
    text-decoration:none;
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:#fff;
    margin-top:10px;
}
</style>
</head>

<body>

<nav>
<div class="logo-area" id="reload">
<img src="logo.png" class="logo-img">
PROMPT<span style="color:var(--primary)">VAULT</span>
</div>

<div>
<button class="btn btn-google" id="googleBtn">Google</button>
<button class="btn btn-primary" id="emailBtn">Email</button>
</div>
</nav>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-card">
<h3>Login</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Password">
<button class="buy-btn" id="loginBtn">Enter</button>
</div>
</div>

<section class="hero">
<h1>Command the <span class="highlight">AI Economy</span></h1>
</section>

<div class="container">

<div class="tab-menu">
<div class="tab-link active" data-tab="home">Home</div>
<div class="tab-link" data-tab="lab">AI Lab</div>
<div class="tab-link" data-tab="vip">VIP</div>
</div>

<!-- HOME -->
<div id="home" class="tab-content active">
<div class="glass">
<h2>Guide</h2>
<p>Use GPT + Midjourney for best output.</p>
</div>
<div class="glass">
<h3>Tip</h3>
<p>Precision = power.</p>
</div>
</div>

<!-- LAB -->
<div id="lab" class="tab-content">
<div class="glass">
<div class="chat-box" id="chat"></div>
<input id="chatInput" placeholder="Ask...">
<button class="btn btn-primary" id="sendBtn">Send</button>
</div>

<div class="glass">
<h3>Upgrade</h3>
<button class="buy-btn" id="openModal">Join Free</button>
</div>
</div>

<!-- VIP -->
<div id="vip" class="tab-content">
<div class="glass">
<h2>VIP</h2>
<p>$9/month</p>
<a href="#" class="buy-btn">Join</a>
</div>
</div>

</div>

<footer style="text-align:center;padding:40px;color:#64748b">
© 2026 PromptVault USA
</footer>

<!-- 🔥 SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
getAuth,
signInWithPopup,
GoogleAuthProvider,
signInWithEmailAndPassword,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* DOM */
const modal = document.getElementById("modal");

/* NAV */
document.getElementById("reload").onclick=()=>location.reload();

/* MODAL */
document.getElementById("emailBtn").onclick=()=>modal.classList.add("show");
document.getElementById("openModal").onclick=()=>modal.classList.add("show");

modal.onclick=e=>{
if(e.target===modal) modal.classList.remove("show");
};

/* AUTH */
document.getElementById("googleBtn").onclick=async()=>{
try{
await signInWithPopup(auth,provider);
alert("Logged in!");
modal.classList.remove("show");
}catch(e){alert(e.message)}
};

document.getElementById("loginBtn").onclick=async()=>{
const email=document.getElementById("email").value;
const pass=document.getElementById("pass").value;

try{
await signInWithEmailAndPassword(auth,email,pass);
}catch{
await createUserWithEmailAndPassword(auth,email,pass);
}
alert("Welcome!");
modal.classList.remove("show");
};

/* TABS */
document.querySelectorAll(".tab-link").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab-link").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
};
});

/* CHAT */
const chat=document.getElementById("chat");
document.getElementById("sendBtn").onclick=()=>{
const input=document.getElementById("chatInput");
if(!input.value) return;

chat.innerHTML+=`<div class="msg user">${input.value}</div>`;
setTimeout(()=>{
chat.innerHTML+=`<div class="msg bot">Use Hyper-Realism prompts.</div>`;
chat.scrollTop=chat.scrollHeight;
},500);

input.value="";
};
</script>

</body>
</html>

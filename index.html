:root{
--bg:#020617;
--card:#0f172a;
--accent:#f59e0b;
--primary:#00d4ff;
--text:#fff;
--muted:#94a3b8;
--border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif}
body{background:var(--bg);color:var(--text);display:flex}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:#020617;
border-right:1px solid var(--border);
padding:20px;
position:fixed;
}

.logo{font-weight:800;font-size:1.2rem;margin-bottom:30px}

.nav a{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:10px;
color:var(--muted);
text-decoration:none;
}

.nav a.active,.nav a:hover{
background:var(--card);
color:white;
}

/* MAIN */
.main{
margin-left:240px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

  <style>
    :root {
      --accent: #4fd1c5;
      --accent-teal: #4fd1c5;
      --secondary: #4fd1c5;
      --success: #10b981;
      --glass: rgba(17, 34, 64, 0.4);
      --border: rgba(255, 255, 255, 0.05);
      --text-gray: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e27;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .glass { background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(12px); border-radius: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 40px; }
    .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); cursor: pointer; }
    .nav { display: flex; gap: 20px; align-items: center; }
    .nav-item { color: var(--text-gray); text-decoration: none; font-weight: 600; cursor: pointer; padding: 8px 16px; border-radius: 12px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); }
    .signin-pill { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 20px; border-radius: 12px; color: white; cursor: pointer; font-weight: 700; position: relative; }
    #cart-count-pill { position: absolute; top: -8px; right: -8px; background: var(--secondary); color: #000; font-size: 0.7rem; font-weight: 800; padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
    
    .page { display: none; width: 100%; }
    .page.active { display: block; }
    #product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; }
    
    .vault-card { padding: 20px; transition: transform 0.3s ease; height: 100%; display: flex; flex-direction: column; }
    .vault-card:hover { transform: translateY(-5px); border-color: var(--accent); }
    .btn-main { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
  </style>

  <script type="module">
    import { auth, db } from './js/app.js'; 

    const PV = {
        state: {
            cart: JSON.parse(localStorage.getItem('pv_cart')) || [],
            products: []
        },
        init() {
            this.ui.updateCartCount();
            const action = new URLSearchParams(window.location.search).get('action');
            if(action) this.router.go(action);
            else if(window.location.hash) this.router.go(window.location.hash.substring(1));
            this.vault.load();
        },
        router: {
            go(id, el) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                const target = document.getElementById(id);
                if (target) target.classList.add('active');
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                if(el) el.classList.add('active');
                if(id === 'library' && window.loadUserLibrary) window.loadUserLibrary();
                window.location.hash = id;
            }
        },
        vault: {
            async load() {
                Papa.parse('/products.csv', {
                    download: true, header: true, skipEmptyLines: true,
                    complete: (results) => {
                        PV.state.products = results.data.map(p => ({
                            id: p.id,
                            name: p.title || p.name,
                            price: parseFloat(p.sale_price) || parseFloat(p.price) || 0,
                            old_price: parseFloat(p.price) > parseFloat(p.sale_price || p.price) ? parseFloat(p.price) : 0,
                            desc: p.desc || p.og_description,
                            slug: p.slug,
                            img: p.img
                        })).filter(p => p.id);
                        this.render(PV.state.products);
                    }
                });
            },
            render(data) {
                const list = document.getElementById('product-list');
                if (!list) return;
                list.innerHTML = data.map(p => {
                    const pData = encodeURIComponent(JSON.stringify(p));
                    const btnId = `paypal-button-${p.id}`;
                    if (window.renderProducts) setTimeout(() => window.renderProducts([p]), 50);

                    return `
                        <div class="glass vault-card">
                            <a href="vault/${p.slug}.html?price=${p.price}&msrp=${p.old_price}" style="text-decoration:none;">
                                <div style="aspect-ratio:1/1; border-radius:15px; overflow:hidden; margin-bottom:15px; background:#000; border:1px solid var(--border);">
                                    <img src="${p.img || 'logo.png'}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='logo.png'">
                                </div>
                            </a>
                            <h3 style="font-size:1.1rem; margin-bottom:8px; color:#fff;">${p.name}</h3>
                            <p style="font-size:0.85rem; color:var(--text-gray); margin-bottom:15px; line-height:1.4;">${p.desc}</p>
                            <div style="margin-top:auto;">
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                                    <span style="font-size:1.4rem; font-weight:800; color:var(--accent);">$${p.price.toFixed(2)}</span>
                                    ${p.old_price > 0 ? `<span style="text-decoration:line-through; color:var(--text-gray); font-size:0.9rem;">$${p.old_price.toFixed(2)}</span>` : ''}
                                </div>
                                <div id="${btnId}" style="min-height:45px;"></div>
                                <button onclick="addToCart('${pData}')" style="background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); width:100%; padding:10px; border-radius:12px; cursor:pointer; margin-top:8px; font-weight:700;">+ Selection</button>
                            </div>
                        </div>`;
                }).join('');
            }
        },
        ui: {
            updateCartCount() {
                const pill = document.getElementById('cart-count-pill');
                if(pill) pill.innerText = JSON.parse(localStorage.getItem('pv_cart') || '[]').length;
            },
            openCart() {
                const cart = JSON.parse(localStorage.getItem('pv_cart') || '[]');
                if (cart.length === 0) return alert("Cart is empty.");
                const modal = document.getElementById('checkout-overlay');
                modal.style.display = 'flex';
                const total = cart.reduce((s, i) => s + parseFloat(i.price), 0);
                document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
                if(window.renderCartPayPal) window.renderCartPayPal(total);
            }
        }
    };
    window.PV = PV;
    document.addEventListener('DOMContentLoaded', () => PV.init());
  </script>

  <div id="checkout-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); z-index:9999; align-items:center; justify-content:center; padding:20px;">
    <div class="glass" style="width:100%; max-width:450px; padding:30px;">
      <h3 style="text-align:center; margin-bottom:20px;">Bundle Checkout</h3>
      <div style="display:flex; justify-content:space-between; font-weight:800; padding:20px 0; border-top:1px solid var(--border);">
        <span>Total Selection:</span> <span id="cart-total" style="color:var(--accent)">$0.00</span>
      </div>
      <div id="cart-paypal-container" style="min-height:150px; margin-top:20px;"></div>
      <button onclick="document.getElementById('checkout-overlay').style.display='none'" style="background:none; border:none; color:var(--text-gray); width:100%; margin-top:20px; cursor:pointer;">Continue Browsing</button>
    </div>
  </div>

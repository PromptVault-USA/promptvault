<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Thank You</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body style="font-family:sans-serif;text-align:center;padding:20px;max-width:600px;margin:auto;">
<h1>Payment successful!</h1>
<p id="status">Loading your download...</p>
<a id="manualLink" href="#" style="display:none;margin:20px auto;padding:12px 24px;background:#0070ba;color:white;text-decoration:none;border-radius:4px;">Download Your Pack</a>
<div id="debug" style="color:red;margin-top:20px;font-size:14px;text-align:left;background:#ffeeee;padding:10px;border-radius:4px;"></div>

<script>
function parseCSV(text) {
  const rows = []; let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (field || row.length) { row.push(field); rows.push(row); row = []; field = ''; }
        if (c === '\r' && next === '\n') i++;
      } else { field += c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.length > 1);
}

async function deliverPack(){
  const params = new URLSearchParams(window.location.search);
  const itemId = params.get('item')?.trim();
  const statusEl = document.getElementById('status');
  const debugEl = document.getElementById('debug');
  const linkEl = document.getElementById('manualLink');

  if(!itemId){ statusEl.innerText = 'Error: No product ID found.'; return; }

  try {
    const res = await fetch('https://promptvaultusa.shop/products.csv?t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const idIdx = headers.indexOf('id');
    const linkIdx = headers.findIndex(h => ['drivelink','drivelink'].includes(h));
    const nameIdx = headers.indexOf('name');
    
    const packRow = rows.slice(1).find(r => r[idIdx] === itemId);
    if(!packRow ||!packRow[linkIdx]) throw new Error('Product or link not found');

    let downloadUrl = packRow[linkIdx];
    const driveMatch = downloadUrl.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if(driveMatch){
      downloadUrl = `https://drive.google.com/uc?export=download&confirm=t&id=${driveMatch[1]}`;
    }
    
    const packName = packRow[nameIdx] || 'Your Pack';
    statusEl.innerHTML = `Thanks! Your download for <strong>${packName}</strong> is ready.`;
    linkEl.href = downloadUrl;
    linkEl.style.display = 'inline-block';
    debugEl.style.display = 'none'; // Hide debug once it works
    window.location.href = downloadUrl;
    
  } catch(e) {
    statusEl.innerText = "Couldn't load your download";
    debugEl.innerHTML = `ERROR: ${e.message}`;
  }
}
deliverPack();
</script>
</body></html>

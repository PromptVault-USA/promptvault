<!DOCTYPE html>
<html>
<head>
  <title>Processing Order...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="background:#0f172a; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh;">
  <h2 id="status">Finalizing your order...</h2>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDGB5seZrnWVXv--Yr_z1lPOOk1kO5CLFU",
    authDomain: "promptvaultusa.firebaseapp.com",
    projectId: "promptvaultusa"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const reference = params.get("reference") || params.get("tx");
  const item = params.get("item") || "PV001";

  if (!reference) {
    window.location.href = '/index.html#library';
  } else {
    // Check if we already have a guest ID saved
    let guestUid = localStorage.getItem('pv_guest_uid');
    
    const proceedWithOrder = async (uid) => {
      const orderRef = doc(db, "orders", reference);
      const existing = await getDoc(orderRef);
      
      if (existing.exists()) {
        window.location.href = '/index.html#library';
        return;
      }
      
      await setDoc(orderRef, {
        uid: uid,
        item: item,
        status: "paid",
        reference: reference,
        account_type: "guest",
        payer_email: "anonymous",
        createdAt: serverTimestamp()
      });
      
      document.getElementById('status').innerText = "✅ Payment Successful!";
      setTimeout(() => window.location.href = '/index.html#library', 1500);
    };

    if (guestUid) {
      // We already have a guest ID, use it
      proceedWithOrder(guestUid);
    } else {
      // First time - create anonymous user and SAVE the ID
      signInAnonymously(auth).then((result) => {
        guestUid = result.user.uid;
        localStorage.setItem('pv_guest_uid', guestUid); // THE FIX
        proceedWithOrder(guestUid);
      }).catch(e => {
        document.getElementById('status').innerText = "Error: " + e.message;
      });
    }
  }
</script>
</body>
</html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Thank You</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body style="font-family:sans-serif;text-align:center;padding:40px;max-width:500px;margin:auto;">
<h1>Payment successful!</h1>
<p id="status">Preparing your download...</p>
<a id="manualLink" href="#" style="display:none;margin-top:20px;padding:12px 24px;background:#0070ba;color:white;text-decoration:none;border-radius:4px;">Download Your Pack</a>
<div id="error" style="color:red;margin-top:20px;display:none;"></div>

<script>
async function deliverPack(){
  const params = new URLSearchParams(window.location.search);
  const itemId = params.get('item')?.trim();
  const statusEl = document.getElementById('status');
  const errorEl = document.getElementById('error');
  const linkEl = document.getElementById('manualLink');

  if(!itemId){
    statusEl.innerText = 'Error: No product ID found.';
    errorEl.innerText = 'Check your email for the file, or contact support with your PayPal transaction ID.';
    errorEl.style.display = 'block';
    return;
  }

  try {
    const res = await fetch('https://promptvaultusa.shop/products.csv?t=' + Date.now());
    if(!res.ok) throw new Error('Could not load product database');

    const text = await res.text();
    const rows = text.trim().split('\n').filter(r=>r);
    
    // Same cleaning function from checkout.html - strips quotes, spaces, BOM
    const clean = (s) => s.replace(/^\uFEFF/, '').replace(/^["']|["']$/g, '').trim();
    
    const headers = rows[0].split(',').map(h => clean(h).toLowerCase());
    const idIdx = headers.indexOf('id');
    const linkIdx = headers.indexOf('link');
    const nameIdx = headers.indexOf('name');
    
    if(idIdx === -1 || linkIdx === -1) throw new Error('CSV missing id or link column');

    const packRow = rows.slice(1).map(r => r.split(',').map(clean)).find(r => r[idIdx] === itemId);

    if(packRow && packRow[linkIdx]){
      const downloadUrl = packRow[linkIdx];
      const packName = packRow[nameIdx] || 'Your Pack';
      
      statusEl.innerHTML = `Thanks! Your download for <strong>${packName}</strong> should start automatically.`;
      linkEl.href = downloadUrl;
      linkEl.style.display = 'inline-block';
      
      // Auto-trigger download
      window.location.href = downloadUrl;
      
    } else {
      throw new Error(`Download link not found for ${itemId}`);
    }
  } catch(e) {
    statusEl.innerText = "Couldn't load your download";
    errorEl.innerHTML = `${e.message}<br><br>Check your email for the file, or contact support with your PayPal transaction ID.`;
    errorEl.style.display = 'block';
  }
}
deliverPack();
</script>
</body></html>

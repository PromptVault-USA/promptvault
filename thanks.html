<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finalizing Order | PromptVault USA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #0f172a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
    .loader-wrap { text-align: center; }
    .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #8b5cf6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h2 { font-weight: 800; letter-spacing: -1px; }
  </style>
</head>
<body>
  <div class="loader-wrap">
    <div class="spinner" id="loader"></div>
    <h2 id="status">Finalizing your order...</h2>
  </div>

<script type="module">
  // Unified Firebase version for compatibility across the project
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDGB5seZrnWVXv--Yr_z1lPOOk1kO5CLFU",
    authDomain: "promptvaultusa.firebaseapp.com",
    projectId: "promptvaultusa"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const reference = params.get("reference") || params.get("tx") || params.get("st");
  const item = params.get("item") || "PV_GUEST_PACK";

  const statusEl = document.getElementById('status');
  const loaderEl = document.getElementById('loader');

  // Logic: Ensure Guest ID persists across sessions
  let guestUid = localStorage.getItem('pv_guest_uid');

  const proceedWithOrder = async (uid) => {
    try {
      const orderRef = doc(db, "orders", reference);
      const existing = await getDoc(orderRef);
      
      // If order already processed, just go to library
      if (existing.exists()) {
        statusEl.innerText = "Order already verified. Redirecting...";
        setTimeout(() => window.location.href = '/index.html#library', 1000);
        return;
      }
      
      // Industrial-grade order logging
      await setDoc(orderRef, {
        uid: uid,
        item: item, // For simple string display
        items: [{ id: item, name: item }], // Array support for complex carts
        status: "paid",
        reference: reference,
        account_type: "guest",
        platform: "web_v7",
        createdAt: serverTimestamp()
      });
      
      loaderEl.style.display = "none";
      statusEl.innerText = "✅ Order Secured!";
      setTimeout(() => window.location.href = '/index.html#library', 1500);

    } catch (error) {
      console.error("Order verification failed:", error);
      statusEl.innerText = "Error verifying payment. Redirecting to support...";
      setTimeout(() => window.location.href = '/index.html#library', 3000);
    }
  };

  if (!reference) {
    statusEl.innerText = "No reference found. Redirecting...";
    setTimeout(() => window.location.href = '/index.html#library', 1500);
  } else {
    // Check for Auth state
    if (guestUid) {
      proceedWithOrder(guestUid);
    } else {
      signInAnonymously(auth).then((result) => {
        localStorage.setItem('pv_guest_uid', result.user.uid);
        proceedWithOrder(result.user.uid);
      }).catch(e => {
        statusEl.innerText = "Verification system offline. Please refresh.";
      });
    }
  }
</script>
</body>
</html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Checkout</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
</head>
<body style="font-family:sans-serif;text-align:center;padding:40px;max-width:500px;margin:auto;">
<h2 id="packName">Loading...</h2>
<p id="packDesc">You're buying one pack. Click below to pay with PayPal.</p>

<form action="https://www.paypal.com/cgi-bin/webscr" method="post" id="ppForm" style="margin-top:20px;">
  <input type="hidden" name="cmd" value="_s-xclick">
  <input type="hidden" name="hosted_button_id" value="N9VN2WGBWTBTA">
  <input type="hidden" name="return" id="returnUrl" value="">
  <input type="image" src="https://www.paypalobjects.com/en_US/i/btn/btn_buynowCC_LG.gif" name="submit" alt="Buy Now">
</form>

<div id="error" style="color:red;margin-top:20px;display:none;"></div>
<div id="debug" style="color:#999;font-size:12px;margin-top:20px;text-align:left;"></div>

<script>
async function setupCheckout(){
  const params = new URLSearchParams(window.location.search);
  const itemId = params.get('item');
  const errorDiv = document.getElementById('error');
  const debugDiv = document.getElementById('debug');
  
  if(!itemId){
    document.getElementById('packName').innerText='Error';
    errorDiv.innerText='No product selected. URL needs?item=niche_001';
    errorDiv.style.display='block';
    document.getElementById('ppForm').style.display='none';
    return;
  }
  
  try {
    const res = await fetch('./products.csv');
    if(!res.ok) throw new Error('CSV not found at./products.csv');
    
    const text = await res.text();
    const rows = text.trim().split('\n').filter(r=>r);
    const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
    const idIdx = headers.indexOf('id');
    const nameIdx = headers.indexOf('name');
    
    if(idIdx === -1) throw new Error('CSV has no "id" column. Headers found: ' + headers.join(', '));
    
    const allIds = rows.slice(1).map(r => r.split(',')[idIdx]?.trim());
    debugDiv.innerHTML = `Looking for: "${itemId}"<br>Found IDs: ${allIds.slice(0,5).join(', ')}...`;
    
    const packRow = rows.slice(1).map(r => r.split(',').map(c => c.trim())).find(r => r[idIdx] === itemId);
    
    if(packRow){
      document.getElementById('packName').innerText = packRow[nameIdx] || 'Prompt Pack';
      document.getElementById('returnUrl').value = `${window.location.origin}/thanks.html?item=${itemId}`;
      debugDiv.innerHTML += '<br><span style="color:green">MATCH FOUND!</span>';
    } else {
      throw new Error(`ID "${itemId}" not in CSV. First 5 IDs: ${allIds.slice(0,5).join(', ')}`);
    }
  } catch(e) {
    document.getElementById('packName').innerText='Error loading product';
    errorDiv.innerText=`${e.message}`;
    errorDiv.style.display='block';
    document.getElementById('ppForm').style.display='none';
  }
}
setupCheckout();
</script>
</body></html>

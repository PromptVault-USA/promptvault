<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // YOUR FIREBASE CONFIG HERE
  const firebaseConfig = { /* ... paste your config ... */ };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  async function handlePayment(e) {
    e.preventDefault();
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('item');
    
    // 1. Ensure user is logged in
    const user = auth.currentUser;
    if(!user) { alert("Please log in first!"); return; }

    try {
      // 2. Create the PENDING order in Firestore
      // This generates a unique ID we will use to verify the payment later
      const orderRef = await addDoc(collection(db, "orders"), {
        uid: user.uid,
        itemId: itemId,
        status: "pending", // 🔥 Crucial: Start as pending
        createdAt: serverTimestamp()
      });

      // 3. Update the form hidden fields dynamically
      const form = document.getElementById('ppForm');
      
      // We change from "hosted_button" to a dynamic "xclick"
      form.innerHTML = `
        <input type="hidden" name="cmd" value="_xclick">
        <input type="hidden" name="business" value="YOUR_PAYPAL_EMAIL@HERE.com">
        <input type="hidden" name="item_name" value="${document.getElementById('packName').innerText}">
        <input type="hidden" name="item_number" value="${orderRef.id}"> <input type="hidden" name="amount" value="9.00"> 
        <input type="hidden" name="currency_code" value="USD">
        <input type="hidden" name="notify_url" value="https://YOUR_FUNCTION_URL_HERE">
        <input type="hidden" name="return" value="${window.location.origin}/thanks.html">
      `;
      
      form.submit();
    } catch (err) {
      console.error(err);
      alert("Checkout failed to initialize.");
    }
  }

  document.getElementById('ppForm').addEventListener('submit', handlePayment);
</script>

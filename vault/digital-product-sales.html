  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a192f 0%, #112240 50%, #1a365d 100%);
      min-height: 100vh;
      color: #e6f1ff;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
    }
    .glass {
      background: rgba(17, 34, 64, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    h1 {
      font-size: 2.5rem;
      color: #64ffda;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .meta {
      color: #8892b0;
      font-size: 0.9rem;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(100, 255, 218, 0.1);
    }
    .meta span {
      background: rgba(100, 255, 218, 0.1);
      color: #64ffda;
      padding: 4px 12px;
      border-radius: 20px;
      margin-right: 10px;
    }
    img {
      width: 100%;
      border-radius: 12px;
      margin: 20px 0;
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    .desc {

      line-height: 1.7;
      color: #ccd6f6;
      margin: 30px 0;
    }
    .price {

      color: #64ffda;
      margin: 30px 0 10px 0;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    /* SALE: Added for strikethrough pricing */
    .old-price {
      text-decoration: line-through;
      color: #8892b0;
      font-size: 1.8rem;
      font-weight: 600;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #64ffda 0%, #00bcd4 100%);
      color: #0a192f;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 16px 40px;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(100, 255, 218, 0.3);
      margin: 10px 10px 10px 0;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(100, 255, 218, 0.5);
    }
    .btn-secondary {
      background: rgba(100, 255, 218, 0.1);
      color: #64ffda;
      border: 1px solid #64ffda;
      box-shadow: none;
    }
    .btn-secondary:hover {
      background: rgba(100, 255, 218, 0.2);
    }
    .footer-note {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(100, 255, 218, 0.1);
      font-size: 0.8rem;
      color: #8892b0;
    }
    @media (max-width: 768px) {
      .glass {
        padding: 24px;
      }
      h1 {
        font-size: 1.8rem;
      }
      .price {
        font-size: 2.2rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.25rem;
      }
      .old-price {
        font-size: 1.4rem;
      }
    }

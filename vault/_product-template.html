<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="doc-title">Loading... | PromptVault USA</title>
  <meta name="description" content="" id="meta-desc">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0a192f 0%,#112240 50%,#1a365d 100%);min-height:100vh;color:#e6f1ff;padding:20px}
    .container{max-width:900px;margin:40px auto}
    .glass{background:rgba(17,34,64,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(100,255,218,.2);border-radius:16px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    h1{font-size:2.5rem;color:#64ffda;margin-bottom:10px;font-weight:700}
    .meta{color:#8892b0;font-size:.9rem;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid rgba(100,255,218,.1)}
    .meta span{background:rgba(100,255,218,.1);color:#64ffda;padding:4px 12px;border-radius:20px;margin-right:10px}
    .hero-visual{width:100%;min-height:200px;border-radius:12px;margin:20px 0;border:1px solid rgba(100,255,218,.2);background:linear-gradient(135deg,rgba(100,255,218,.1) 0%,rgba(0,188,212,.1) 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
    .hero-visual img{width:100%;border-radius:12px;display:block}
    .hero-text{font-size:3rem;font-weight:900;line-height:1.1;background:linear-gradient(135deg,#64ffda 0%,#00bcd4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase;letter-spacing:-1px}
    .desc{font-size:1.1rem;line-height:1.7;color:#ccd6f6;margin:30px 0}
    .price{font-size:3rem;font-weight:800;color:#64ffda;margin:30px 0 10px 0;display:flex;align-items:center;gap:1rem}
    .old-price{text-decoration:line-through;color:#8892b0;font-size:1.8rem;font-weight:600}
    .btn{display:inline-block;background:linear-gradient(135deg,#64ffda 0%,#00bcd4 100%);color:#0a192f;font-weight:700;font-size:1.2rem;padding:16px 40px;border-radius:8px;text-decoration:none;transition:all .3s ease;box-shadow:0 4px 20px rgba(100,255,218,.3);margin:10px 10px 0}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(100,255,218,.5)}
    .btn.disabled{background:#333;color:#666;cursor:not-allowed;box-shadow:none}
    .footer-note{margin-top:40px;padding-top:20px;border-top:1px solid rgba(100,255,218,.1);font-size:.8rem;color:#8892b0}
    @media (max-width:768px){.glass{padding:24px}h1{font-size:1.8rem}.hero-text{font-size:2rem}.price{font-size:2.2rem;flex-direction:column;align-items:flex-start;gap:.25rem}.old-price{font-size:1.4rem}}
  </style>
</head>
<body>
  <div class="container">
    <div class="glass">
      <h1 id="name">Loading...</h1>
      <div class="meta" id="meta"></div>
      <div class="hero-visual">
        <img id="img" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
        <div class="hero-text" style="display:none;" id="hero-text"></div>
      </div>
      <div class="desc" id="desc"></div>
      <div class="price" id="price"></div>
      <a href="#" id="buy-btn" class="btn">Loading...</a>
      <div class="footer-note" id="footer-note"></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
  const slug = location.pathname.split('/').pop().replace('.html','').toLowerCase().trim();
  
  Papa.parse('/products.csv', {
    download: true, 
    header: true, 
    skipEmptyLines: true,
    complete: ({data}) => {
      const p = data.find(r => r.slug && r.slug.toLowerCase().trim() === slug);
      
      if (!p) { 
        document.getElementById('name').textContent = 'Product Not Found';
        document.getElementById('buy-btn').textContent = 'Check CSV slug: ' + slug;
        document.getElementById('buy-btn').classList.add('disabled');
        return; 
      }
      
      const displayPrice = parseFloat(p.sale_price) || parseFloat(p.price) || 0;
      const oldPrice = parseFloat(p.price) || 0;
      const showDiscount = oldPrice > displayPrice;
      
      // Fill page
      document.getElementById('doc-title').textContent = p.name + ' | PromptVault USA';
      document.getElementById('meta-desc').content = p.desc || '';
      document.getElementById('name').textContent = p.name;
      document.getElementById('desc').textContent = p.desc || '';
      document.getElementById('img').src = p.img || '';
      document.getElementById('img').alt = p.name;
      document.getElementById('hero-text').textContent = p.name;
      document.getElementById('meta').innerHTML = `<span>${p.category || ''}</span><span>ID: ${p.id || ''}</span>`;
      document.getElementById('price').innerHTML = showDiscount 
        ? `<span class="old-price">$${oldPrice}</span> $${displayPrice}` 
        : `$${displayPrice}`;
      document.getElementById('footer-note').innerHTML = `GMC ID: ${p.gmc_id || ''} | Secure PayPal Checkout | Instant delivery`;
      
      // Buy button
      const btn = document.getElementById('buy-btn');
      if (p.paypal_link && p.paypal_link.trim()) {
        btn.href = p.paypal_link.trim();
        btn.textContent = 'Buy Now - Instant Access';
      } else {
        btn.textContent = 'Coming Soon';
        btn.classList.add('disabled');
        btn.onclick = e => e.preventDefault();
      }
    }
  });
</script>
<script src="/js/inject-footer.js"></script>
</body>
</html>

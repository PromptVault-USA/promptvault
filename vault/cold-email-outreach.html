<body class="{{SALE_CLASS}}"> <div class="container">

  <script src="https://www.paypal.com/sdk/js?client-id=AWapcH0acCdiTehBXFR48XBWweSYxkuTnJ7zLadzyL9rLjGyrvVEKwKBuLUUW1ZIvcaNlhk-qSCxvu_m&currency=USD"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGB5seZrnWVXv--Yr_z1lPOOk1kO5CLFU",
      authDomain: "promptvaultusa.firebaseapp.com",
      projectId: "promptvaultusa",
      storageBucket: "promptvaultusa.firebasestorage.app",
      messagingSenderId: "960105895017",
      appId: "1:960105895017:web:1aa79742d36960d2bfbef8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Final Price Logic (JavaScript Side)
    const rawPrice = "9.00";
    const checkoutPrice = parseFloat(rawPrice).toFixed(2);

    const getGid = () => {
      let gid = localStorage.getItem('pv_guest_uid');
      if (!gid) {
        gid = 'pv_guest_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('pv_guest_uid', gid);
      }
      return gid;
    };

    // Auto-Adapt PayPal Checkout
    paypal.Buttons({
      style: { layout: 'vertical', color: 'gold', shape: 'rect' },
      createOrder: (data, actions) => {
        return actions.order.create({
          purchase_units: [{
            amount: { value: checkoutPrice },
            description: "PromptVaultUSA - Cold Email Outreach",
            custom_id: "niche_022"
          }]
        });
      },
      onApprove: (data, actions) => {
        return actions.order.capture().then(async (details) => {
          const gid = getGid();
          await setDoc(doc(db, "orders", details.id), {
            uid: gid,
            items: [{ id: "niche_022", name: "Cold Email Outreach", price: checkoutPrice }],
            status: 'paid',
            createdAt: serverTimestamp()
          });
          window.location.href = `/success.html?tx=${details.id}&guest=${gid}`;
        });
      }
    }).render('#paypal-button-container');

    document.getElementById('add-to-cart-btn').onclick = () => {
        let cart = JSON.parse(localStorage.getItem('pv_cart')) || [];
        cart.push({ id: "niche_022", name: "Cold Email Outreach", price: parseFloat(checkoutPrice) });
        localStorage.setItem('pv_cart', JSON.stringify(cart));
        alert("Success! Check your cart to complete the bundle.");
    };
  </script>

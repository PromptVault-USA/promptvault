<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... | PromptVault USA</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0a192f 0%,#112240 50%,#1a365d 100%);min-height:100vh;color:#e6f1ff;padding:20px}
    .container{max-width:900px;margin:40px auto}
    .glass{background:rgba(17,34,64,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(100,255,218,0.2);border-radius:16px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
    h1{font-size:2.5rem;color:#64ffda;margin-bottom:10px;font-weight:700}
    .meta{color:#8892b0;font-size:0.9rem;margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid rgba(100,255,218,0.1)}
    .meta span{background:rgba(100,255,218,0.1);color:#64ffda;padding:4px 12px;border-radius:20px;margin-right:10px}
    .hero-visual{width:100%;min-height:200px;border-radius:12px;margin:20px 0;border:1px solid rgba(100,255,218,0.2);background:linear-gradient(135deg,rgba(100,255,218,0.1) 0%,rgba(0,188,212,0.1) 100%);display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px}
    .hero-visual img{width:100%;border-radius:12px;display:block}
    .hero-text{font-size:3rem;font-weight:900;line-height:1.1;background:linear-gradient(135deg,#64ffda 0%,#00bcd4 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-transform:uppercase;letter-spacing:-1px}
    .desc{font-size:1.1rem;line-height:1.7;color:#ccd6f6;margin:30px 0}
    .price{font-size:3rem;font-weight:800;color:#64ffda;margin:30px 0 10px 0;display:flex;align-items:center;gap:1rem}
    .old-price{text-decoration:line-through;color:#8892b0;font-size:1.8rem;font-weight:600}
    .btn{display:inline-block;background:linear-gradient(135deg,#64ffda 0%,#00bcd4 100%);color:#0a192f;font-weight:700;font-size:1.2rem;padding:16px 40px;border-radius:8px;text-decoration:none;transition:all 0.3s ease;box-shadow:0 4px 20px rgba(100,255,218,0.3);margin:10px 10px 0}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(100,255,218,0.5)}
    .btn.disabled{background:#666;cursor:not-allowed}
    .footer-note{margin-top:40px;padding-top:20px;border-top:1px solid rgba(100,255,218,0.1);font-size:0.8rem;color:#8892b0}
    @media (max-width:768px){.glass{padding:24px}h1{font-size:1.8rem}.hero-text{font-size:2rem}.price{font-size:2.2rem;flex-direction:column;align-items:flex-start;gap:0.25rem}.old-price{font-size:1.4rem}}
  </style>
</head>
<body>
  <div class="container">
    <div class="glass">
      <h1 id="name">Loading...</h1>
      <div class="meta" id="meta"></div>
      <div class="hero-visual">
        <img id="img" src="" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
        <div class="hero-text" id="hero-text" style="display:none;"></div>
      </div>
      <div class="desc" id="desc"></div>
      <div class="price" id="price"></div>
      <a href="#" id="buy-btn" class="btn">Loading...</a>
      <div class="footer-note" id="footer-note"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script type="application/ld+json" id="schema"></script>
  <script>
    const slug = location.pathname.split('/').pop().replace('.html','');
    Papa.parse('/products.csv', {
      download: true, header: true, skipEmptyLines: true,
      complete: ({data}) => {
        const p = data.find(r => r.slug === slug);
        if (!p) { document.getElementById('name').textContent = 'Product Not Found'; return; }
        
        document.title = p.title + ' | PromptVault USA';
        name.textContent = p.title;
        desc.textContent = p.description || '';
        img.src = p.image || '';
        img.alt = p.title;
        hero_text.textContent = p.title;
        meta.innerHTML = `<span>${p.category || ''}</span><span>ID: ${p.id || ''}</span>`;
        price.innerHTML = p.old_price ? `<span class="old-price">$${p.old_price}</span> $${p.price}` : `$${p.price}`;
        footer_note.innerHTML = `GMC ID: ${p.gmc_id || ''} | Secure PayPal Checkout | Instant delivery to your library`;
        
        const btn = document.getElementById('buy-btn');
        if (p.paypal_link) {
          btn.href = p.paypal_link;
          btn.textContent = 'Buy Now - Instant Access';
        } else {
          btn.textContent = 'Link Missing - Check CSV';
          btn.classList.add('disabled');
          btn.onclick = e => e.preventDefault();
        }
        
        // Google schema for SEO
        document.getElementById('schema').textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "Product",
          "name": p.title,
          "description": p.description,
          "image": "https://promptvaultusa.shop" + p.image,
          "sku": p.id,
          "mpn": p.gmc_id,
          "brand": {"@type": "Brand", "name": "PromptVault USA"},
          "offers": {
            "@type": "Offer",
            "url": location.href,
            "priceCurrency": "USD",
            "price": p.price,
            "availability": "https://schema.org/InStock",
            "seller": {"@type": "Organization", "name": "PromptVault USA"}
          }
        });
      }
    });
  </script>
  <script src="/js/inject-footer.js"></script>
</body>
</html>

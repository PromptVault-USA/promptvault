<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligence Vault | PromptVault USA</title>

  <link rel="stylesheet" href="https://promptvaultusa.shop/css/style.css" />
  <link rel="icon" type="image/png" href="https://promptvaultusa.shop/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root { 
      --accent: #4fd1c5; 
      --secondary: #8b5cf6;
      --bg-dark: #0a1120; 
      --glass: rgba(17, 34, 64, 0.4);
      --border: rgba(255, 255, 255, 0.05);
      --success: #10b981;
      --text-gray: #94a3b8;
    }
    .bottom-nav { max-width: 480px !important; }
    .nav-item small { font-size: 0.55rem !important; font-weight: 800; }

    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      max-width: 1000px;
      margin: 30px auto;
    }
    .product-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .product-card:hover { border-color: var(--accent); transform: translateY(-5px); }
    
    .loader { 
      border: 3px solid rgba(255, 255, 255, 0.1); 
      border-radius: 50%; 
      border-top: 3px solid var(--accent); 
      width: 40px; 
      height: 40px; 
      animation: spin 1s linear infinite; 
      margin: 40px auto; 
    }
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      background: var(--glass);
      border-radius: 24px;
      border: 1px dashed var(--border);
      margin: 30px auto;
      max-width: 1000px;
    }
    .btn-download {
      background: var(--accent);
      color: #000;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      text-align: center;
      margin-top: 20px;
      font-size: 0.9rem;
      display: block;
    }
  </style>
</head>

<body>
  <header>
    <div class="header-wrap">
      <a href="https://promptvaultusa.shop/index.html" style="cursor:pointer; display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;">
        <img src="https://promptvaultusa.shop/logo.png" class="logo-box" alt="Logo" />
        <span style="font-weight:800; letter-spacing:-1px;">
          PROMPTVAULT<span style="color:var(--secondary)">USA</span>
        </span>
      </a>

      <div style="display: flex; gap: 12px; align-items: center;">
        <span id="user-display" style="display:none;font-size:0.85rem;font-weight:600;color:var(--text-gray);"></span>
      </div>
    </div>
  </header>

  <main class="container" style="flex: 1;">
    <div style="max-width: 1000px; margin: 0 auto; padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
      <h1 style="font-size: 1.5rem; letter-spacing: -1px; margin: 0;">My Intelligence Vault</h1>
    </div>

    <div id="loading-zone">
      <div class="loader"></div>
      <p style="text-align:center; color:#94a3b8; font-size: 0.9rem;">Syncing your assets...</p>
    </div>

    <div id="user-library-grid" class="library-grid" style="display:none;">
      <!-- Products will be injected here -->
    </div>

    <div id="empty-state" class="empty-state" style="display:none;">
      <p style="color: #94a3b8; font-size: 1.1rem;">Your vault is currently empty.</p>
      <a href="https://promptvaultusa.shop/vault.html" class="btn-main" style="display:inline-block; margin-top:15px; background:var(--accent); color:#000; padding:12px 25px; border-radius:12px; text-decoration:none; font-weight:800;">
        BROWSE PROMPTS
      </a>
      <div style="margin-top:25px; padding-top:20px; font-size:0.85rem; color:#64748b; border-top: 1px solid var(--border);">
        Paid but nothing here? <a href="https://promptvaultusa.shop/claim.html" style="color:var(--accent); font-weight:800; text-decoration:none;">Claim purchase manually</a>
      </div>
    </div>
  </main>

  <footer class="legal-text">
    <div class="legal-links">
      <a href="https://promptvaultusa.shop/index.html">Home</a>
      <a href="https://promptvaultusa.shop/vault.html">Vault</a>
      <a href="https://promptvaultusa.shop/library.html">Library</a>
      <a href="https://promptvaultusa.shop/blog.html">Blog</a>
      <a href="https://promptvaultusa.shop/claim.html">Claim</a>
      <a href="https://promptvaultusa.shop/legal.html#privacy">Privacy</a>
      <a href="https://promptvaultusa.shop/legal.html#terms">Terms</a>
      <a href="https://promptvaultusa.shop/legal.html#refunds">Refunds</a>
    </div>
    <p>© 2026 PromptVault USA | Cebu City, PH</p>
  </footer>

  <nav class="bottom-nav">
    <a class="nav-item" href="https://promptvaultusa.shop/index.html"><span>🏠</span><small>Home</small></a>
    <a class="nav-item" href="https://promptvaultusa.shop/vault.html"><span>⊞</span><small>Vault</small></a>
    <a class="nav-item" href="https://promptvaultusa.shop/blog.html"><span>📰</span><small>Blog</small></a>
    <a class="nav-item active" href="https://promptvaultusa.shop/library.html"><span>🎁</span><small>Library</small></a>
    <a class="nav-item" href="https://promptvaultusa.shop/claim.html"><span>🧾</span><small>Claim</small></a>
  </nav>

  <script type="module">
    import { auth, db } from 'https://promptvaultusa.shop/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Metadata mapping: In a live app, this could also come from a 'products' collection
    const PRODUCT_MAP = {
      'RealEstate': { name: 'Real Estate Lead Gen Pack', desc: '50 Tested Prompts', file: 'https://promptvaultusa.shop/downloads/real-estate-prompts.pdf' },
      'TikTok': { name: 'TikTok Affiliate Marketing', desc: '13 Tested Prompts', file: 'https://promptvaultusa.shop/downloads/tiktok-affiliate.pdf' },
      'Copywriting': { name: 'Copywriting Sales Pages', desc: '10 Tested Prompts', file: 'https://promptvaultusa.shop/downloads/copy-sales.pdf' }
      // Add other product IDs here matching your 'custom_id' from PayPal
    };

    const grid = document.getElementById('user-library-grid');
    const loading = document.getElementById('loading-zone');
    const empty = document.getElementById('empty-state');
    const userDisplay = document.getElementById('user-display');

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "https://promptvaultusa.shop/index.html#login-required";
        return;
      }

      if (user.email) {
        userDisplay.style.display = 'inline-block';
        userDisplay.textContent = user.email;
      }

      // REAL-TIME SYNC: Listens for the Webhook to write the entitlement record
      const entitlementsRef = collection(db, "users", user.uid, "entitlements");
      
      onSnapshot(entitlementsRef, (snapshot) => {
        loading.style.display = 'none';
        
        if (snapshot.empty) {
          grid.style.display = 'none';
          empty.style.display = 'block';
        } else {
          empty.style.display = 'none';
          grid.style.display = 'grid';
          grid.innerHTML = ''; // Clear previous

          snapshot.forEach((doc) => {
            const data = doc.data();
            const product = PRODUCT_MAP[data.productId] || { 
              name: data.productId, 
              desc: 'Digital Prompt Asset', 
              file: '#' 
            };

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
              <div>
                <h3 style="margin:0; font-size:1.2rem; color:var(--accent);">${product.name}</h3>
                <p style="font-size:0.85rem; color:#94a3b8; margin:10px 0;">${product.desc}</p>
                <div style="font-size:0.7rem; color:#475569; text-transform:uppercase;">Order ID: ${data.orderId || 'Direct'}</div>
              </div>
              <a href="${product.file}" class="btn-download" target="_blank">DOWNLOAD ACCESS</a>
            `;
            grid.appendChild(card);
          });
        }
      });
    });
  </script>
</body>
</html>

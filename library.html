<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Library | PromptVault USA</title>

  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root { --accent-teal: #4fd1c5; --bg-dark: #0a1120; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: #e6f1ff;
      margin: 0;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto 30px;
      gap: 16px;
    }
    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      border: 1px dashed rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>
  <div class="header">
    <a href="/index.html"
       style="color:var(--accent-teal); text-decoration:none; font-weight:800; font-size:0.8rem;">
      ← RETURN TO SHOP
    </a>

    <h1 style="font-size: 1.5rem; letter-spacing: -1px; margin: 0;">
      Intelligence Vault
    </h1>
  </div>

  <div id="user-library-grid" class="library-grid">
    <div class="empty-state" id="empty-msg">
      <p style="color: #94a3b8;">Your vault is currently locked.</p>
      <a href="/vault.html"
         class="btn-main"
         style="display:inline-block; margin-top:15px; background:var(--accent-teal); color:#000; padding:10px 20px; border-radius:12px; text-decoration:none; font-weight:800;">
        BROWSE PROMPTS
      </a>
      <div style="margin-top:12px; font-size:0.85rem; color:#94a3b8;">
        Paid but library is empty? <a href="/claim.html" style="color:var(--accent-teal); font-weight:800; text-decoration:none;">Claim purchase</a>
      </div>
    </div>
  </div>

  <!-- Loads products + fills #user-library-grid via Firebase orders (from updated app.js) -->
  <script type="module" src="/app.js"></script>

  <!-- Optional: keeps your bottom nav + UI patching if you include it on pages -->
  <script src="/js/inject-footer.js"></script>
</body>
</html>

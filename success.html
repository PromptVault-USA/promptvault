<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | PromptVault USA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--success);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-item { background:rgba(16, 185, 129, 0.05); padding:18px; border-radius:16px; border:1px solid var(--border); margin-bottom:12px; text-align:left; display:flex; justify-content:space-between; align-items:center; transition: 0.3s; }
        .success-item:hover { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .btn-main { transition: 0.3s; border: none; text-decoration: none; display: inline-block; text-align: center; }
        .btn-main:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>
<div class="spotlight"></div>

<div class="container" style="text-align:center; padding-top:100px; padding-bottom: 60px;">
    <div class="glass-card" style="max-width:550px; margin:0 auto; padding: 45px; border: 1px solid var(--border); border-radius: 32px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);">
        <div id="status-icon" style="font-size: 4rem; margin-bottom: 25px;">⏳</div>
        <h2 id="status-title" style="color:var(--success); margin-bottom: 12px; font-weight: 800; font-size: 1.8rem;">Verifying Payment...</h2>
        <p id="status-msg" style="margin-bottom:35px; color:#94a3b8; font-size: 1rem; line-height: 1.6;">Securing your AI Intelligence assets in your permanent vault. Do not close this window.</p>
        
        <div id="product-delivery-zone">
            <div id="loading-spinner" class="loader"></div>
            <p id="verification-text" style="color: #64748b; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px;">EXECUTING ATOMIC HANDSHAKE...</p>
        </div>

        <button onclick="window.location.href='index.html?action=library#library'" id="finish-btn" class="btn-main" style="margin-top: 30px; background: var(--success); color: white; width: 100%; display: none; padding: 20px; border-radius: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);">View in My Library</button>
        
        <div style="margin-top: 30px; padding-top: 25px; border-top: 1px solid var(--border);">
            <p style="font-size: 0.75rem; color: #475569; margin-bottom: 5px;">Payment Reference</p>
            <span id="display-tx" style="font-family: monospace; color: var(--accent); font-size: 0.85rem; font-weight: 800;">---</span>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDGB5seZrnWVXv--Yr_z1lPOOk1kO5CLFU",
        authDomain: "promptvaultusa.firebaseapp.com",
        projectId: "promptvaultusa",
        storageBucket: "promptvaultusa.firebasestorage.app",
        messagingSenderId: "960105895017",
        appId: "1:960105895017:web:1aa79742d36960d2bfbef8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function verifyAndUnlock(txID) {
        const displayArea = document.getElementById('product-delivery-zone');
        const statusTitle = document.getElementById('status-title');
        const statusMsg = document.getElementById('status-msg');
        const statusIcon = document.getElementById('status-icon');
        const finishBtn = document.getElementById('finish-btn');

        try {
            // 1. Fetch Order
            const orderRef = doc(db, "orders", txID);
            const orderSnap = await getDoc(orderRef);

            if (!orderSnap.exists()) {
                throw new Error("Syncing database...");
            }

            // 2. Mark as Paid (This unlocks it for the Library)
            await updateDoc(orderRef, {
                status: 'paid',
                completedAt: serverTimestamp()
            });

            // 3. Fetch Master Catalog for Download Links
            const res = await fetch('products.json');
            const products = await res.json();
            const orderData = orderSnap.data();

            // 4. Update UI
            statusIcon.innerText = "🚀";
            statusTitle.innerText = "Assets Unlocked!";
            statusTitle.style.color = "var(--success)";
            statusMsg.innerText = "The intelligence has been moved to your permanent library.";
            finishBtn.style.display = "block";
            
            displayArea.innerHTML = orderData.items.map(item => {
                const catalogItem = products.find(p => p.id === item.id || p.gmc_id === item.id);
                return `
                    <div class="success-item">
                        <div>
                            <strong style="color:white; font-size:0.9rem;">${item.name}</strong><br>
                            <small style="color:var(--success); font-weight:800;">VERIFIED PERMANENT ACCESS</small>
                        </div>
                        <a href="${catalogItem?.drivelink || '#'}" target="_blank" style="background:var(--success); color:white; padding:10px 16px; border-radius:12px; font-weight:800; text-decoration:none; font-size:0.75rem;">OPEN ↗</a>
                    </div>`;
            }).join('');

            // Clear local states
            localStorage.removeItem('pv_cart');

        } catch (error) {
            console.log("Handshake retry...", error.message);
            // Auto-retry after 4 seconds if the DB hasn't updated yet
            setTimeout(() => verifyAndUnlock(txID), 4000);
        }
    }

    onAuthStateChanged(auth, (user) => {
        const urlParams = new URLSearchParams(window.location.search);
        const txID = urlParams.get('tx') || urlParams.get('custom');
        
        if (txID) {
            document.getElementById('display-tx').innerText = txID;
            
            // Support Guest checkout by signing in anonymously if no user is found
            if (!user) {
                signInAnonymously(auth).then(() => verifyAndUnlock(txID));
            } else {
                verifyAndUnlock(txID);
            }
        } else {
            document.getElementById('status-title').innerText = "Awaiting Reference...";
        }
    });
</script>
</body>
</html>

name: Auto-Fix Blog SEO

on:
  workflow_dispatch: # This allows you to click a button to run it!

permissions:
  contents: write # Allows the bot to save the files

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Run our SEO fixing script
        run: node scripts/fix-og-tags.js

      - name: Save changes to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add blog/*.html
          git commit -m "SEO: Auto-injected missing OpenGraph tags to 29 blog posts" || echo "No changes to commit"
          git push

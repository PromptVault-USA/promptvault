name: PromptVault GMC Sync

on:
  push:
    paths:
      - 'products.json' # Triggers automatically when you add new packs
  workflow_dispatch: # Allows you to "Push the Button" manually right now

jobs:
  sync_products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Google API Library
        run: npm install googleapis

      - name: Execute Sync Script
        env:
          GMC_KEY: ${{ secrets.GMC_KEY }}
        run: node scripts/upload.js

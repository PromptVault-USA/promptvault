name: Auto Update Sitemap

on:
  push:
    branches: [ main ]
    paths:
      - 'blog/**.html'
      - 'vault/**.html'
      - 'index.html'
      - 'blog.html'
      - 'legal.html'
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate sitemap.xml
        run: |
          cat > generate-sitemap.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const DOMAIN = 'https://promptvaultusa.shop';
          const TODAY = new Date().toISOString().split('T')[0];

          const urls = [];

          // 1. Root pages with custom priorities
          const rootPages = [
            { file: 'index.html', priority: '1.0', changefreq: 'daily' },
            { file: 'blog.html', priority: '0.8', changefreq: 'daily' },
            { file: 'legal.html', priority: '0.5', changefreq: 'monthly' }
          ];

          rootPages.forEach(p => {
            if (fs.existsSync(p.file)) {
              urls.push({
                loc: `${DOMAIN}/${p.file}`,
                lastmod: TODAY,
                changefreq: p.changefreq,
                priority: p.priority
              });
            }
          });

          // 2. All /vault/ product pages - priority 0.9
          if (fs.existsSync('vault')) {
            fs.readdirSync('vault')
             .filter(file => file.endsWith('.html'))
             .sort()
             .forEach(file => {
                urls.push({
                  loc: `${DOMAIN}/vault/${file}`,
                  lastmod: TODAY,
                  changefreq: 'weekly',
                  priority: '0.9'
                });
              });
          }

          // 3. All /blog/ posts - priority 0.7 
          if (fs.existsSync('blog')) {
            fs.readdirSync('blog')
             .filter(file => file.endsWith('.html') &&!file.startsWith('template'))
             .sort()
             .forEach(file => {
                urls.push({
                  loc: `${DOMAIN}/blog/${file}`,
                  lastmod: TODAY,
                  changefreq: 'weekly',
                  priority: '0.7'
                });
              });
          }

          // 4. Build XML
          let xml = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">`;

          urls.forEach(u => {
            xml += `
  <url>
    <loc>${u.loc}</loc>
    <lastmod>${u.lastmod}</lastmod>
    <changefreq>${u.changefreq}</changefreq>
    <priority>${u.priority}</priority>
  </url>`;
          });

          xml += `
</urlset>`;

          fs.writeFileSync('sitemap.xml', xml);
          console.log(`Generated sitemap.xml with ${urls.length} URLs`);
          console.log(`Vault pages: ${urls.filter(u => u.loc.includes('/vault/')).length}`);
          console.log(`Blog pages: ${urls.filter(u => u.loc.includes('/blog/')).length}`);
          EOF

          node generate-sitemap.js

      - name: Commit sitemap if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "No sitemap changes"
          else
            git commit -m "Auto-update sitemap.xml [skip ci]"
            git push
          fi

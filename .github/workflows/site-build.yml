name: Build site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "site-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Upgraded to LTS 22 to fix deprecation warnings
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build dist
        run: |
          set -euxo pipefail
          rm -rf dist
          mkdir -p dist

          # Running your scripts (Ensuring build.js uses the new ESM version we just made)
          node scripts/generate-products-json.js
          node scripts/build.js
          
          # Note: If upload.js hasn't been converted to ESM yet, it might fail next.
          node scripts/upload.js

          # Copying all necessary storefront files to the dist folder
          cp -R index.html app.js products.csv products.json gmc-lookup.json sitemap.xml css assets vault blog logo.png legal.html success.html blog.html dist/

          # Post-processing for GitHub Pages compatibility
          node scripts/pages-postprocess.cjs dist ${{ github.event.repository.name }}

      - name: Upload artifact for Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          if-no-files-found: error

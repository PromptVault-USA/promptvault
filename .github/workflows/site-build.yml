name: Build site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write # Changed to write so scripts can update data

concurrency:
  group: "site-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install

      - name: Build dist
        env:
          GMC_KEY: ${{ secrets.GMC_KEY }}
          MERCHANT_ID: ${{ secrets.MERCHANT_ID }}
        run: |
          set -euxo pipefail
          rm -rf dist
          mkdir -p dist

          # 1. Generate data
          node scripts/generate-products-json.js
          node scripts/build.js
          node scripts/gmc-sync.js

          # 2. Copy files to dist
          cp -R index.html app.js products.csv products.json gmc-lookup.json sitemap.xml css assets vault blog logo.png legal.html success.html blog.html dist/

          # 3. CRITICAL FIX: We DELETED the pages-postprocess line.
          # You no longer need to prefix URLs for a custom domain.

      - name: Upload artifact for Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          if-no-files-found: error

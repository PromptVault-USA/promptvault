1)  .github/workflows/site-build.yml 
name: Build site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "site-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build dist
        run: |
          set -euxo pipefail
          rm -rf dist
          mkdir -p dist

          # Keep your repo's existing build commands here.
          node scripts/generate-products-json.js
          node scripts/build.js

          # Copy build outputs into dist (adjust to match your repo)
          cp -R index.html app.js products.csv products.json gmc-lookup.json sitemap.xml css assets vault blog logo.png legal.html success.html blog.html dist/

          # IMPORTANT: rewrite /css/... to /<repo>/css/... for project pages
          node scripts/pages-postprocess.js dist $ github.event.repository.name 

      - name: Upload artifact for Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          if-no-files-found: error

name: Build site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "site-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Cache removed because package-lock.json is missing

      - name: Install deps
        run: npm install # Changed from 'npm ci' to allow building without a lock file

      - name: Build dist
        run: |
          set -euxo pipefail
          rm -rf dist
          mkdir -p dist

          # Running your ESM scripts
          node scripts/generate-products-json.js
          node scripts/build.js
          node scripts/upload.js

          # Copying storefront files to dist
          cp -R index.html app.js products.csv products.json gmc-lookup.json sitemap.xml css assets vault blog logo.png legal.html success.html blog.html dist/

          # Ensure the post-process script matches the filename in your /scripts/ folder
          # If you renamed it to .js in the previous step, update the extension here:
          node scripts/pages-postprocess.js dist ${{ github.event.repository.name }}

      - name: Upload artifact for Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          if-no-files-found: error

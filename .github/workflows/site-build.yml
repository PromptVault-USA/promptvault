name: Build site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "site-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install

      - name: Build dist
        env:
          # FIXED: Wrapped secrets in correct GitHub Action syntax
          GMC_KEY: ${{ secrets.GMC_KEY }}
          MERCHANT_ID: ${{ secrets.MERCHANT_ID }}
        run: |
          set -euxo pipefail
          rm -rf dist
          mkdir -p dist

          # 1. Generate data
          node scripts/generate-products-json.js
          node scripts/build.js
          node scripts/gmc-sync.js

          # 2. Copy files to dist (Ensures all necessary files are deployed)
          # Using -Rf to force recursive copy of folders like 'assets' and 'vault'
          cp -Rf index.html vault.html library.html claim.html blog.html app.js firebase-config.js products.csv products.json gmc-lookup.json sitemap.xml robots.txt CNAME google8da2d931e5014485.html pinterest-6a583.html css js assets vault blog logo.png og-image.jpg legal.html success.html template.html dist/

          # 3. pages-postprocess intentionally removed to maintain root paths on custom domain

      - name: Upload artifact for Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          if-no-files-found: error

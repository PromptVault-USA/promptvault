name: Build vault from products.csv
on:
  push:
    branches: ["main"]
    paths:
      - "products.csv"
permissions:
  contents: write
concurrency:
  group: "site-build"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build
        run: node scripts/build.js
      - name: Commit generated outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json gmc-lookup.json vault/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Build vault from products.csv"
          git push

name: Auto Social Poster

on:
  schedule:
    # Runs automatically every day at 14:00 UTC (10:00 AM Eastern Time)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to trigger it manually whenever you want using a button

jobs:
  post-to-socials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Social Dependencies
        run: npm install twitter-api-v2 axios

      - name: Run Post Script
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: node scripts/social-poster.js

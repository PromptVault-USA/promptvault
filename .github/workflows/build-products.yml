name: Build Product Pages

on:
  push:
    paths:
      - 'products.csv'
      - 'scripts/build.js'
      - 'scripts/generate-products-json.js'
      - 'vault/_product-template.html'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: $ secrets.GITHUB_TOKEN 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Generate products.json from products.csv
        run: node scripts/generate-products-json.js

      - name: Build vault pages + gmc-lookup.json
        run: node scripts/build.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add vault/*.html products.json gmc-lookup.json

          git diff --staged --quiet || (git commit -m "Auto-build: pages + products.json from products.csv" && git push)


name: Build Product Pages

on:
  push:
    paths:
      - "products.csv"
      - "scripts/build.js"
      - "scripts/generate-products-json.js"
      - "vault/_product-template.html"
      - ".github/workflows/build-products.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate products.json from products.csv
        run: node scripts/generate-products-json.js

      - name: Build vault pages + gmc-lookup.json
        run: node scripts/build.js

      - name: Commit and push generated files
        env:
          GITHUB_TOKEN: $ secrets.GITHUB_TOKEN 
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add vault/*.html products.json gmc-lookup.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-build: pages + products.json from products.csv"

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main

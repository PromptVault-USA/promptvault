name: Build Product Pages

on:
  push:
    paths:
      - 'products.yml'                # Trigger when your source database changes
      - 'scripts/build.js'            # Trigger if you update the generator logic
      - 'vault/_product-template.html' # Trigger if you change the UI design
  workflow_dispatch:                  # Allows you to run this manually from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write                 # Essential for pushing generated files back to the repo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            npm install js-yaml # Ensures the build script can parse your YAML
          fi

      - name: Run build script
        run: node scripts/build.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage all generated HTML in vault and the GMC lookup file
          git add vault/*.html gmc-lookup.json 
          
          # Only commit if changes actually exist
          git diff --staged --quiet || (git commit -m "Auto-build: Generated pages from products.yml" && git push)

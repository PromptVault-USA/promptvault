name: Test Old GMC Key Sync

on:
  workflow_dispatch:
  # Add this to sync every time you update your products
  push:
    paths:
      - 'products.csv' 

permissions:
  contents: write # Changed from read to allow script updates

jobs:
  test-old-key-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Test Old Key Sync
        run: node scripts/gmc-sync.js
        env:
          # IMPORTANT: You must go to Org Settings > Secrets > Actions 
          # and re-add these two keys!
          MERCHANT_ID: ${{ secrets.MERCHANT_ID }}
          GMC_KEY: ${{ secrets.GMC_KEY }}

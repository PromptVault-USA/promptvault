name: Test Old GMC Key Sync

on:
  workflow_dispatch:
  # Syncs every time you update your products via CSV
  push:
    paths:
      - 'products.csv' 
    branches:
      - main

permissions:
  contents: write # Needed if you intend to commit changes from the script back to the repo

jobs:
  test-old-key-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Speeds up subsequent runs by caching dependencies

      - name: Install Dependencies
        run: npm ci # Safer structure for CI/CD compared to standard install

      - name: Execute GMC Sync Script
        run: node scripts/gmc-sync.js
        env:
          # IMPORTANT: Verify these keys exist in Repo Settings > Secrets > Actions
          MERCHANT_ID: ${{ secrets.MERCHANT_ID }}
          GMC_KEY: ${{ secrets.GMC_KEY }}

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gmc-sync-logs
          path: scripts/
